<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <span class="brand-name">用户管理系统</span>
        </div>
        <div class="navbar-menu">
            {% if session.get('username') %}
                <span class="nav-welcome">欢迎，{{ session.get('username') }}</span>
                <a href="{{ url_for('upload') }}" class="nav-link">上传头像</a>
                <a href="{{ url_for('profile') }}" class="nav-link">个人中心</a>
                <a href="{{ url_for('dynamic_page', name='help') }}" class="nav-link">帮助中心</a>
                <a href="{{ url_for('ping') }}" class="nav-link">Ping测试</a>
                <a href="{{ url_for('xml_import') }}" class="nav-link">XML导入</a>
                <a href="{{ url_for('logout') }}" class="nav-link">退出</a>
            {% else %}
                <a href="{{ url_for('register') }}" class="nav-link">注册</a>
                <a href="{{ url_for('login') }}" class="nav-link">登录</a>
                <a href="{{ url_for('dynamic_page', name='help') }}" class="nav-link">帮助中心</a>
            {% endif %}
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
